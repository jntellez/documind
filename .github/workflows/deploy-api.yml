name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - apps/api/**
      - packages/types/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-api.yml

concurrency:
  group: deploy-api-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate API
        run: pnpm api:typecheck

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/documind-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

  trigger-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      API_DEPLOY_WEBHOOK_URL: ${{ secrets.API_DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        if: ${{ env.API_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "$API_DEPLOY_WEBHOOK_URL"

      - name: Report missing deploy webhook
        if: ${{ env.API_DEPLOY_WEBHOOK_URL == '' }}
        run: |
          echo "GHCR image published, but API_DEPLOY_WEBHOOK_URL is not configured yet."
          echo "Add the secret in GitHub to enable automatic production deploys."
